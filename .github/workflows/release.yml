name: Release

on:
  push:
    tags:
      - 'v*'

# Allow the workflow's GITHUB_TOKEN to create releases and upload assets.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: .\build.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeQuotaTray-windows
          path: dist/ClaudeQuotaTray.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ClaudeQuotaTray.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Archive .app
        run: |
          cd dist
          zip -r ClaudeQuotaTray-macos.zip ClaudeQuotaTray.app || zip -r ClaudeQuotaTray-macos.zip ClaudeQuotaTray

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ClaudeQuotaTray-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build source bundle
        run: |
          VERSION="${GITHUB_REF_NAME}"
          OUT="claude-quota-tray-${VERSION}"
          mkdir -p "$OUT"
          cp -r src assets \
                "Run claude quota tray.bat" \
                "Setup claude quota tray.bat" \
                "Update claude quota tray.bat" \
                "Uninstall claude quota tray.bat" \
                requirements.txt README.md LICENSE \
                "$OUT/"
          zip -r "${OUT}.zip" "$OUT"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: claude-quota-tray-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
